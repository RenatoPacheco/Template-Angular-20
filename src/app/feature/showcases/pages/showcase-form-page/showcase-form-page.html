<div class="container">
    <h1>Showcase Form Page</h1>
    <div class="row">
        <form [formGroup]="formLogin"
            class="mx-auto" style="max-width: 540px;">
            <div class="form-grid-inline">
                <app-form-text
                    formControlName="login"
                    autocomplete="off"
                    control-secret="true"
                    label="Login">
                </app-form-text>
                <app-form-text
                    formControlName="senha"
                    autocomplete="new-password"
                    control-secret="true"
                    type="password"
                    label="Senha">
                </app-form-text>
            </div>
            <div class="form-actions mb-3 mt-3">
                <button app-button 
                    theme="submit" 
                    type="submit">
                </button>
                <button app-button 
                    theme="secondary" 
                    type="button"
                    title="clique aqui para recuperar o acesso">
                    <i class="fa fa-refresh">&nbsp;</i>
                    Recuperar acesso
                </button>
            </div>
        </form>
    </div>
    
    <form [formGroup]="form">
        <legend>Outro form</legend>
        <div class="form-grid">
            <app-form-text
                transform="cpf"                
                formControlName="inputText"
                label="Input text">
            </app-form-text>

            <app-form-text
                formControlName="inputPassword"
                label="Input password">
            </app-form-text>

            <app-form-text
                formControlName="inputEmail"
                label="Input email">
            </app-form-text>

            <app-form-text
                formControlName="inputSearch"
                label="Input search">
            </app-form-text>

            <app-form-textarea
                class="full-width"
                formControlName="textArea"
                label="Text Area">
            </app-form-textarea>
            
            <app-form-editor
                class="full-width"
                formControlName="textEditor"
                label="Text Editor">
            </app-form-editor>   
        </div>
        <div class="form-row" formArrayName="checkbox">
            @for (opcao of opcoes; track opcao.id; let i = $index) {
            <app-form-checkbox 
            [formControlName]="i"
            inline="true" [value]="opcao.id">
                {{opcao.descricao}}
            </app-form-checkbox> 
            }
        </div>
        <div class="form-row">
            @for (opcao of opcoes; track opcao.id; let i = $index) {
            <app-form-radio 
            formControlName="radio"
            group="radio" switch="true"
            inline="true" [value]="opcao.id">
                {{opcao.descricao}}
            </app-form-radio> 
            }
        </div>
        <div class="form-actions mb-3">
            <button app-button theme="submit" type="submit"></button>
            <button app-button theme="cancel" type="button"></button>
        </div>
    </form>
</div>
