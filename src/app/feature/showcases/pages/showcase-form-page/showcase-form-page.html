<div class="container">
    <h1>Showcase Form Page</h1>
    
    <form [formGroup]="form">
        <div class="form-grid">
            <app-form-input-text
                formControlName="inputText"
                label="Input text">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputPassword"
                label="Input password">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputEmail"
                label="Input email">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputSearch"
                label="Input search">
            </app-form-input-text>

            <app-form-text-area
                class="full-width"
                formControlName="textArea"
                label="Text Area">
            </app-form-text-area>            
        </div>
        <div class="form-actions mb-3">
            <button app-button theme="submit" type="submit"></button>
            <button app-button theme="cancel" type="button"></button>
        </div>
    </form>
</div>
