<div class="container">
    <h1>Showcase Form Page</h1>
    <div class="row">
        <form [formGroup]="formLogin"
            class="mx-auto" style="max-width: 540px;">
            <div class="form-grid-inline">
                <app-form-input-text
                    formControlName="login"
                    autocomplete="off"
                    control-secret="true"
                    label="Login">
                </app-form-input-text>
                <app-form-input-text
                    formControlName="senha"
                    autocomplete="new-password"
                    control-secret="true"
                    type="password"
                    label="Senha">
                </app-form-input-text>
            </div>
            <div class="form-actions mb-3 mt-3">
                <button app-button 
                    theme="submit" 
                    type="submit">
                </button>
                <button app-button 
                    theme="secondary" 
                    type="button"
                    title="clique aqui para recuperar o acesso">
                    <i class="fa fa-refresh">&nbsp;</i>
                    Recuperar acesso
                </button>
            </div>
        </form>
    </div>
    
    <form [formGroup]="form">
        <legend>Outro form</legend>
        <div class="form-grid">
            <app-form-input-text
                formControlName="inputText"
                label="Input text">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputPassword"
                label="Input password">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputEmail"
                label="Input email">
            </app-form-input-text>

            <app-form-input-text
                formControlName="inputSearch"
                label="Input search">
            </app-form-input-text>

            <app-form-text-area
                class="full-width"
                formControlName="textArea"
                label="Text Area">
            </app-form-text-area>        
        </div>
        <div class="form-row" formArrayName="checkbox">
            <app-form-checkbox
                inline="true" type="checkbox"
                [formControlName]="0"
                value="LER"
                label="Ler">
            </app-form-checkbox>
            <app-form-checkbox
                inline="true" type="checkbox"
                [formControlName]="1"
                value="EDITAR"
                label="Editar">
            </app-form-checkbox>
            <app-form-checkbox
                inline="true" type="checkbox"
                [formControlName]="2"
                value="EXCLUIR"
                label="Excluir">
            </app-form-checkbox>
        </div>
        <div class="form-row">
            <app-form-radio
                inline="true" type="radio"
                controlName="radio"
                value="LER">
                Ler
            </app-form-radio>
            <app-form-radio
                inline="true"
                controlName="radio"
                value="EDITAR">
                Ediar
            </app-form-radio>
            <app-form-radio
                inline="true"
                controlName="radio"
                value="EXCLUIR">
                Excluir
            </app-form-radio>
        </div>
        <div class="form-actions mb-3">
            <button app-button theme="submit" type="submit"></button>
            <button app-button theme="cancel" type="button"></button>
        </div>
    </form>
    <form>
        <div class="form-row">
            <app-form-checkbox
                inline="true"
                type="checkbox"
                label="1tem 001">
            </app-form-checkbox>
            <app-form-checkbox
                inline="true"
                type="checkbox"
                label="1tem 001">
            </app-form-checkbox>
            <app-form-checkbox
                inline="true"
                name="teste"
                type="radio"
                label="1tem 001">
            </app-form-checkbox>
            <app-form-checkbox
                inline="true"
                name="teste"
                type="radio"
                label="1tem 001">
            </app-form-checkbox>
        </div>
        <div class="form-row">
            <app-form-checkbox
                theme="switch"
                inline="true"
                type="checkbox"
                label="1tem 001">
            </app-form-checkbox>
            <app-form-checkbox
                theme="switch"

                label="1tem 001">
            </app-form-checkbox>
            <app-form-checkbox
                theme="switch"
                inline="true"
                name="teste2"

                theme="switch"

            </app-form-checkbox>
        </div>

</div>
