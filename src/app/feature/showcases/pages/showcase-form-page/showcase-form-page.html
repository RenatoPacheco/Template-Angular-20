<div class="container">
    <h1>Showcase Form Page</h1>    
    <form [formGroup]="form">
        <div class="row">            
            <app-form-input
                class="col-md-6"
                type="text"
                formControlName="inputText"
                label="Input text"
                control-secret
                placeholder="Enter text here">
            </app-form-input>
            <app-form-input
                class="col-md-6"
                type="password"
                control-secret
                formControlName="inputPassword"
                label="Input password"
                placeholder="Enter password here">
            </app-form-input>
            <app-form-input
                class="col-md-6"
                type="email"
                formControlName="inputEmail"
                label="Input email"
                placeholder="Enter email here">
            </app-form-input>
            <app-form-input
                class="col-md-6"
                type="search"
                formControlName="inputSearch"
                label="Input search"
                placeholder="Enter search here">
            </app-form-input>
            <app-form-text-area
                class="col-md-12"
                formControlName="textArea"
                label="Text Area"
                placeholder="Enter text here">
            </app-form-text-area>
        </div>
    </form>
</div>
