<input  
  [checked]="_checked()"
  (change)="onToggle($event)"
  [disabled]="_disabled()"
  [readonly]="_readonly()"
  class="form-check-input" 
  type="checkbox"
  [id]="_id()"
  [name]="_name()" />
<label class="form-check-label" [for]="_id()">
  <span [innerHTML]="_label()"></span>
</label>
<ng-content></ng-content>
