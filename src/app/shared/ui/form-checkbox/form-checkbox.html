<input  
  [checked]="checked"
  (change)="onToggle($event)"
  [disabled]="disabled || readonly"
  class="form-check-input" 
  type="checkbox"
  [id]="id" />
<label class="form-check-label" [for]="id">
  <span #content>
    <ng-content></ng-content>
  </span>
  @if(!content.hasChildNodes()){
  <span [innerHTML]="label"></span>
  }
</label>
