<input  
  [checked]="_checked()"
  (change)="onToggle($event)"
  [disabled]="_disabled()"
  [readonly]="_readonly()"
  [class]="elementClass()" 
  [type]="_type()"
  [id]="_id()"
  [name]="_name()">
<label [class]="labelClass()" [for]="_id()">
  &nbsp;<span [innerHTML]="_label()"></span>
</label>
<ng-content></ng-content>
