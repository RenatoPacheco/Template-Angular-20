<input  
  [checked]="_checked()"
  (change)="onToggle($event)"
  [disabled]="_disabled() || _readonly()"
  class="form-check-input" 
  type="checkbox"
  [id]="_id()" />
<label class="form-check-label" [for]="_id()">
  <span #content>
    <ng-content></ng-content>
  </span>
  @if(!content.hasChildNodes()){
  <span [innerHTML]="_label()"></span>
  }
</label>
