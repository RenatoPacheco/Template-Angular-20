<label app-label 
    [for]="id"
    [text]="label"
    (error)="onError()"
    (helper)="onHelper()"
    [enabled-error]="showErrorComputed()"
    [enabled-helper]="enabledHelper"></label>

@if(isActive() && useCompleteConfig()) {
<ckeditor 
    [config]="completeConfig()" [(ngModel)]="value" (blur)="onBlur()" (focus)="onBlur()" 
    (ready)="emitReady($event)" (change)="emitChange($event)" [id]="id">
</ckeditor>
}
@if(isActive() && useBasicConfig()) {
<ckeditor 
    [config]="basicConfig()" [(ngModel)]="value" (blur)="onBlur()" (focus)="onBlur()"
    (ready)="emitReady($event)" (change)="emitChange($event)">
</ckeditor>
}
@if(!isActive()) {
<ckeditor [readOnly]="true"
    [config]="disabledConfig()" [(ngModel)]="value" (blur)="onBlur()" (focus)="onBlur()" 
    (ready)="emitReady($event)" (change)="emitChange($event)" [id]="id">
</ckeditor>
}
<ng-content></ng-content>
