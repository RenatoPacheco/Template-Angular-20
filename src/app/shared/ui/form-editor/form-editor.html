<label app-label 
    [for]="_id()"
    [text]="_label()"
    (error)="onError()"
    (helper)="onHelper()"
    [enabled-error]="showErrorComputed()"
    [enabled-helper]="_enabledHelper()"></label>

@if(isActive() && useCompleteConfig()) {
<ckeditor 
    [config]="completeConfig()" [(ngModel)]="valueSync" (blur)="onBlur()" (focus)="onBlur()" 
    (ready)="emitReady($event)" (change)="emitChange($event)" [id]="id">
</ckeditor>
}
@if(isActive() && useBasicConfig()) {
<ckeditor 
    [config]="basicConfig()" [(ngModel)]="valueSync" (blur)="onBlur()" (focus)="onBlur()"
    (ready)="emitReady($event)" (change)="emitChange($event)">
</ckeditor>
}
@if(!isActive()) {
<ckeditor [readOnly]="true"
    [config]="disabledConfig()" [(ngModel)]="valueSync" (blur)="onBlur()" (focus)="onBlur()" 
    (ready)="emitReady($event)" (change)="emitChange($event)" [id]="id">
</ckeditor>
}
active: {{ isActive() }} mobile: {{ isMobile() }} value: {{ _value() }}
