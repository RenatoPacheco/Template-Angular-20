<label app-label 
    [for]="_id()"
    [text]="_label()"
    (error)="onError()"
    (helper)="onHelper()"
    [enabled-error]="showErrorComputed()"
    [enabled-helper]="_enabledHelper()"></label>
<div class="form-input-text"
    [class.action-clear]="hasValueComputed()"
    [class.action-show]="showSecretComputed()"
    [class.action-hide]="hideSecretComputed()">
    <input #element
        [value]="_value()"
        (blur)="onBlur()"
        (input)="onInput($event)"
        [disabled]="_disabled()"
        [readonly]="_readonly()"
        [autocomplete]="_autocomplete()"
        [type]="typeComputed()" 
        [class]="inputClassComputed()" 
        [id]="_id()"
        [placeholder]="_placeholder()" />
    <button app-button
        class="action-hide"
        theme="transparent"
        type="button"
        title="clique para ocular o valor"
        (click)="onToggleSecret()">
        <i class="fa fa-eye"></i>
    </button>
    <button app-button
        class="action-show"
        theme="transparent"
        type="button"
        title="clique para mostrar o valor"
        (click)="onToggleSecret()">
        <i class="fa fa-eye-slash"></i>
    </button>
    <button app-button
        class="action-clear"
        title="clique para limpar o valor"
        theme="transparent"
        type="button"
        (click)="clear()">
        <i class="fa fa-times"></i>
    </button>
</div>
<ng-content></ng-content>
