<div class="mb-3">
    <label app-label 
        [for]="idComputed()"
        [text]="labelComputed()"
        [error]="errorComputed()"
        [helper]="helperComputed()"></label>
    <div class="form-input-field">
        <input #input [(ngModel)]="value"
            [type]="typeComputed()" 
            [class]="inputClassComputed()" 
            [id]="idComputed()"
            [placeholder]="placeholderComputed()" />
        <button app-button
            class="form-input-clear"
            theme="transparent"
            type="button">
            x
        </button>
        <button app-button
            class="form-input-show"
            theme="transparent"
            type="button">
            <i class="fa fa-eye"></i>
        </button>
        <button app-button
            class="form-input-hide"
            theme="transparent"
            type="button">
            <i class="fa fa-eye-slash"></i>
        </button>
    </div>
    <ng-content></ng-content>
</div>
