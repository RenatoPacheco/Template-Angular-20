<input  
  [checked]="_checked()"
  (change)="onToggle($event)"
  [disabled]="_disabled()"
  [readonly]="_readonly()"
  class="form-check-input" 
  type="radio"
  [id]="_id()"
  [name]="_name()" />
<label class="form-check-label" [for]="_id()">
  <span #ref><ng-content></ng-content></span>
  @if(!ref.hasChildNodes()){
  <span [innerHTML]="_label()"></span>
  }
</label>
