<input  #element
  [checked]="checked"
  (change)="onToggle($event)"
  [disabled]="_disabled()"
  [readonly]="_readonly()"
  class="form-check-input" 
  type="radio"
  [name]="_controlName()"
  [id]="_id()" />
<label class="form-check-label" [for]="_id()">
    <span [innerHTML]="_label()"></span>
</label>
<ng-content></ng-content>
