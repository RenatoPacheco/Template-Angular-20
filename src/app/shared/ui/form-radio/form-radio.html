<input  
  [checked]="_checked()"
  (change)="onToggle($event)"
  [disabled]="_disabled()"
  [readonly]="_readonly()"
  class="form-check-input" 
  type="radio"
  [id]="_id()"
  [name]="_name()" />
<label 
  class="form-check-label" 
  [innerHTML]="_label()" [for]="_id()">
</label>
<ng-content></ng-content>
