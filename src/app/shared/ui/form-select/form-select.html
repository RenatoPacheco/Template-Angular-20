<label app-label 
    [for]="id"
    [text]="label"
    [loading]="loading"
    (error)="emitError()"
    (helper)="emitHelper()"
    [enabled-error]="showError()"
    [enabled-helper]="enabledHelper"></label>
<select
    [id]="id"
    [class]="elementClass()"
    [disabled]="disabled || readonly || loading"
    [value]="selectedIndex()"
    (change)="emitChange($event)"
    (blur)="emitBlur()">
    @for(item of itens(); track item.value) {
        <option
            [value]="$index"
            [disabled]="item.disabled">
            {{ item.text }}
        </option>    
    }
</select>
