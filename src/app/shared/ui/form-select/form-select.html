<label app-label 
    [for]="id"
    [text]="label"
    (error)="emitError()"
    (helper)="emitHelper()"
    [enabled-error]="showError()"
    [enabled-helper]="enabledHelper"></label>
<select
    [id]="id"
    class="form-select"
    [disabled]="disabled"
    [attr.aria-placeholder]="placeholder"
    [value]="selectedIndex()"
    (change)="emitChange($event)"
    (blur)="emitBlur()">
    @for(item of itens(); track item.value) {
        <option
            [value]="$index"
            [disabled]="item.disabled">
            {{ item.text }}
        </option>    
    }
</select>
<p>Value: {{ value }}</p>
