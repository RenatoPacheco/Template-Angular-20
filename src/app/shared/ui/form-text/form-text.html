<label app-label 
    [for]="id"
    [text]="label"
    (error)="onError()"
    (helper)="emitHelper()"
    [enabled-error]="showError()"
    [enabled-helper]="enabledHelper"></label>
<div class="form-element"
    [class.action-clear]="hasValue()"
    [class.action-show]="showSecret()"
    [class.action-hide]="hideSecret()">
    <input #element
        [value]="value"
        (blur)="emitBlur()"
        (input)="emitChange($event)"
        [disabled]="disabled"
        [readonly]="readonly"
        [autocomplete]="autocomplete"
        [type]="typeComputed()" 
        [class]="elementClass()" 
        [id]="id"
        [placeholder]="placeholder" />
    @if (isActive()) {
    <button app-button
        class="action-hide"
        theme="transparent"
        type="button"
        title="clique para ocular o valor"
        (click)="onToggleSecret()">
        <i class="fa fa-eye"></i>
    </button>
    <button app-button
        class="action-show"
        theme="transparent"
        type="button"
        title="clique para mostrar o valor"
        (click)="onToggleSecret()">
        <i class="fa fa-eye-slash"></i>
    </button>
    <button app-button
        class="action-clear"
        title="clique para limpar o valor"
        theme="transparent"
        type="button"
        (click)="clear()">
        <i class="fa fa-times"></i>
    </button>
    }
</div>
<ng-content></ng-content>
