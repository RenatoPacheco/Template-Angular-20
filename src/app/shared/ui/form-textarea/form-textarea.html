<label app-label 
    [for]="_id()"
    [text]="_label()"
    (error)="onError()"
    (helper)="onHelper()"
    [enabled-error]="showErrorComputed()"
    [enabled-helper]="_enabledHelper()"></label>
<div class="form-text-area"
    [class.action-clear]="hasValueComputed()">
    <textarea #element
        [value]="_value()"
        (blur)="onBlur()"
        (input)="onInput($event)"
        [disabled]="_disabled()"
        [readonly]="_readonly()"
        [class]="elementClass()" 
        [id]="_id()"
        [rows]="_rows()"
        [placeholder]="_placeholder()">
    </textarea>
    @if (isActive()) {
    <button app-button
        class="action-clear"
        title="clique para limpar o valor"
        theme="transparent"
        type="button"
        (click)="clear()">
        <i class="fa fa-times"></i>
    </button>
    }
</div>
<ng-content></ng-content>
