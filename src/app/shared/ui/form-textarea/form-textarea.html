<label app-label 
    [for]="id"
    [text]="label"
    (error)="onError()"
    (helper)="emitHelper()"
    [enabled-error]="showError()"
    [enabled-helper]="enabledHelper"></label>
<div class="form-text-area"
    [class.action-clear]="hasValue()">
    <textarea #element
        [value]="value"
        (blur)="emitBlur()"
        (input)="emitChange($event)"
        [disabled]="disabled"
        [readonly]="readonly"
        [class]="elementClass()" 
        [id]="id"
        [rows]="rows"
        [placeholder]="placeholder">
    </textarea>
    @if (isActive()) {
    <button app-button
        class="action-clear"
        title="clique para limpar o valor"
        theme="transparent"
        type="button"
        (click)="clear()">
        <i class="fa fa-times"></i>
    </button>
    }
</div>
<ng-content></ng-content>
